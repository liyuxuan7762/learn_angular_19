<div class="container col-10 bg-info-subtle">
  <form [formGroup]="userForm" class="m-3 p-3" (ngSubmit)="onSubmit()">
    <h3 class="text-center mt-3">Add User</h3>
    <div class="form-group m-3">
      <label>Username</label>
      <input type="text" class="form-control" placeholder=" Enter username" formControlName="username">
    </div>

    <div class="form-group m-3">
      <label>Phone</label>
      <input type="text" class="form-control" placeholder=" Enter phone" formControlName="phone">
    </div>

    <div class="form-group m-3">
      <label>Email</label>
      <input type="text" class="form-control" placeholder=" Enter email" formControlName="email">
    </div>
    <button type="submit" class="btn btn-success m-3">Sumbit</button>
    <button class="btn btn-danger m-3" (click)="onCancel()">Cancel</button>
  </form>
</div>
