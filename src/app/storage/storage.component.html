<div class="container col-12">
  <h3 class="text-center text-success">Session Storage</h3>
  <div class="row justify-content-evenly">
    <div class="col-2 text-center">
      <button (click)="setSessionStorage()" class="btn btn-success">Set Storage</button>
    </div>
    <div class="col-2 text-center">
      <button (click)="getSessionStorage()" class="btn btn-success">Get Storage</button>
    </div>
    <div class="col-2 text-center">
      <button (click)="removeSessionStorage()" class="btn btn-success">Remove Storage</button>
    </div>
    <div class="col-2 text-center">
      <button (click)="clearSessionStorage()" class="btn btn-success">Clear Storage</button>
    </div>

    <h2>{{ sessionValue }}</h2>

  </div>
</div>
<hr />
