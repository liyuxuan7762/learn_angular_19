<div class="container col-10">
  <h3 class="text-center m-3">Resource API</h3>
  <table class="table table-success table-striped m-3">
    <thead>
      <tr>
        <td>ID</td>
        <td>Name</td>
        <td>Email</td>
      </tr>
    </thead>
    <tbody>
      @for (user of resourceData$.value(); track $index) {
      <tr>
        <td>{{user.id}}</td>
        <td>{{user.username}}</td>
        <td>{{user.email}}</td>
      </tr>
      }
    </tbody>
  </table>
</div>
