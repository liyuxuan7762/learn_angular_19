<div class="container col-10">
  <app-reuseable class="text-center" message="CRUD Demo"></app-reuseable>
  <h3 class="text-center m-3">CRUD Operation with JSON Server</h3>
  <table class="table table-success table-striped m-3">
    <thead>
      <tr>
        <td>ID</td>
        <td>Name</td>
        <td>Email</td>
        <td>Phone</td>
        <td>Update</td>
        <td>View</td>
        <td>Delete</td>
      </tr>
    </thead>
    <tbody>
      @for (user of users; track $index) {
      <tr>
        <td>{{user.id}}</td>
        <td>{{user.username}}</td>
        <td>{{user.email}}</td>
        <td>{{user.phone}}</td>

        <td>
          <button class="btn btn-primary" [routerLink]="['/updateUser', user.id]">
            Update
          </button>
        </td>

        <td>
          <button class="btn btn-info" [routerLink]="['/viewUser', user.id]">
            View
          </button>
        </td>

        <td>
          <button class="btn btn-danger" (click)="deleteUser(user.id)">
            Delete
          </button>
        </td>
      </tr>
      }
    </tbody>
  </table>

  <button class="btn btn-success m-3" routerLink="/addUser">Add User</button>


</div>
